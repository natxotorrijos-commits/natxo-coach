<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATXO ELITE | Coaching System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="logo">NATXO<span>ELITE</span></div>
        <nav class="tabs">
            <button class="tab-btn active" onclick="showSection('dashboard')">Dashboard</button>
            <button class="tab-btn" onclick="showSection('planner')">Planificador</button>
            <button class="tab-btn" onclick="showSection('feed')">Strava Feed</button>
        </nav>
        <button id="strava-connect" class="btn-connect">Conectar Strava</button>
    </header>

    <main class="container">
        <section id="dashboard" class="content-section active">
            <div class="kpi-grid">
                <div class="card kpi-card highlight-cyan">
                    <div class="label">Fitness (CTL)</div>
                    <div class="value" id="ctl-val">84</div>
                    <div class="trend">↑ Óptimo</div>
                </div>
                <div class="card kpi-card highlight-red">
                    <div class="label">Fatiga (ATL)</div>
                    <div class="value" id="atl-val">101</div>
                    <div class="trend">⚠ Alta</div>
                </div>
                <div class="card kpi-card highlight-orange">
                    <div class="label">Forma (TSB)</div>
                    <div class="value" id="tsb-val">-18</div>
                    <div class="trend">Recuperando</div>
                </div>
            </div>

            <div class="card graph-card">
                <h2>Análisis de Rendimiento</h2>
                <canvas id="performanceChart"></canvas>
            </div>
        </section>

        <section id="planner" class="content-section">
            <div class="card">
                <h2>Planificación Semanal</h2>
                <div class="table-responsive">
                    <table class="planner-table">
                        <thead>
                            <tr>
                                <th>Día</th>
                                <th>Actividad</th>
                                <th>Objetivo</th>
                                <th>Duración</th>
                            </tr>
                        </thead>
                        <tbody id="planner-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="feed" class="content-section">
            <h2>Últimas 10 Actividades</h2>
            <div id="activities-container" class="feed-grid"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
